<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedi-Notfall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Schockraum-Optimierung: Verhindert Zoomen bei Klick auf Inputs */
        input { font-size: 16px !important; }
        .bg-emergency { background-color: #b91c1c; } /* Intensives Rot */
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-x-hidden">

    <header class="bg-emergency p-4 shadow-lg sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-center">Pedi-Notfall 🚨</h1>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-6">
        
        <section id="input-area" class="bg-slate-800 p-6 rounded-2xl border-2 border-slate-700 shadow-xl">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1">Alter (Jahre)</label>
                    <input type="number" id="ageInput" placeholder="0" 
                           class="w-full bg-slate-700 text-3xl p-3 rounded-xl border-2 border-slate-600 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1">Gewicht (kg)</label>
                    <input type="number" id="weightInput" placeholder="0"
                           class="w-full bg-slate-700 text-3xl p-3 rounded-xl border-2 border-slate-600 focus:border-green-500 outline-none transition-all">
                </div>
            </div>
            <p id="weightEstimationHint" class="text-sm text-blue-400 mt-2 italic min-h-[1.25rem]"></p>
        </section>

        <section id="results-area" class="space-y-4">
            <h2 class="text-lg font-semibold border-b border-slate-700 pb-2">Medikamenten-Dosierung</h2>
            <div id="medicationList" class="space-y-3">
                <p class="text-slate-500 text-center py-10">Bitte Alter oder Gewicht eingeben...</p>
            </div>
        </section>

    </main>

    <script src="logic.js"></script>
    <script src="main.js"></script>
</body>
</html>
